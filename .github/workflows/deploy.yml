name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'site/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine base path
        id: base
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & Build
        env:
          VP_BASE: ${{ steps.base.outputs.path }}
        run: |
          npm ci
          npm run build

      - name: Copy build to site/
        run: |
          rm -rf site
          cp -r docs/.vitepress/dist site
          touch site/.nojekyll

      - name: Push site/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git diff --staged --quiet && echo "No site changes" && exit 0
          git commit -m "deploy: update site [skip ci]"
          git push
